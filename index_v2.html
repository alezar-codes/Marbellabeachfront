<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marbella Beachfront | Jardines de las Golondrinas Luxury Rental</title>
    <meta name="description" content="Direct booking of first-line apartments in Marbella. 120 m², sea view, 2 bedrooms. Walking distance to Nikki Beach.">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <!-- FullCalendar Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/icalendar@6.1.11/index.global.min.js"></script>

    <style>
        :root {
            --gold: #c19b76;
            --dark: #2c2c2c;
            --light-bg: #fdfbf7;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            background-color: var(--light-bg);
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        .navbar-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            margin-top: 56px;
        }

        .hero h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-padding { padding: 80px 0; }

        .btn-direct {
            background-color: var(--gold);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }

        .btn-direct:hover {
            transform: translateY(-3px);
            background-color: #a88562;
            color: white;
        }

        /* Calendar Styling */
        #calendar {
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        .fc-event {
            background-color: #f1f1f1 !important;
            border: none !important;
            cursor: default;
        }
        .fc-event-title { display: none !important; }
        .fc-day-today { background-color: rgba(193, 155, 118, 0.1) !important; }
        .fc-toolbar-title { font-size: 1.3rem !important; }
        .fc-button-primary { background-color: transparent !important; border: 1px solid #eee !important; color: #333 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-glass fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">MARBELLA LUXURY</a>
            <div class="ms-auto">
                <a class="btn-direct btn-sm" href="#booking">Check Dates</a>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Frontline Excellence</h1>
            <p class="lead">Wake up to the Mediterranean breeze</p>
        </div>
    </header>

    <section id="booking" class="section-padding container text-center">
        <h2 class="mb-5">Availability & Calendar</h2>
        
        <div id="calendar-container" style="background: white; border-radius: 20px; border: 1px solid #eee; padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); max-width: 900px; margin: 0 auto;">
            <div id="calendar"></div>
        </div>

        <div class="mt-5">
            <p class="text-muted small mb-3">Questions about dates? Contact us directly:</p>
            <a href="https://wa.me/37061028665" class="btn-direct">
                <i class="fab fa-whatsapp me-2"></i> Message on WhatsApp
            </a>
        </div>
    </section>

    <footer class="py-5 bg-dark text-white text-center">
        <p class="mb-0">&copy; 2026 Jardines de las Golondrinas. Luxury Direct Booking.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
   document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'en',
        firstDay: 1,
        headerToolbar: {
            left: 'prev',
            center: 'title',
            right: 'next'
        },
        events: function(info, successCallback, failureCallback) {
            const icalUrl = 'https://calendar.google.com/calendar/ical/81d94c0e97baf81fbf0e24dd54fb90c6a559ccca45ba65b2242572a864290a42%40group.calendar.google.com/public/basic.ics';
            
            // Используем api.allorigins.win/raw для надежности
            const proxiedUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(icalUrl);

            fetch(proxiedUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(data => {
                    var jcalData = ICAL.parse(data);
                    var comp = new ICAL.Component(jcalData);
                    var vevents = comp.getAllSubcomponents('vevent');

                    var events = vevents.map(function(vevent) {
                        var event = new ICAL.Event(vevent);
                        // Важно: добавляем 1 день к дате окончания, так как FullCalendar считает дату окончания эксклюзивной
                        var endDate = event.endDate.toJSDate();
                        
                        return {
                            title: 'Reserved',
                            start: event.startDate.toJSDate(),
                            end: endDate,
                            display: 'background',
                            backgroundColor: '#f8d7da',
                            allDay: true
                        };
                    });
                    successCallback(events);
                })
                .catch(error => {
                    console.error('Calendar error:', error);
                    // Попробуем запасной прокси
                    const secondaryProxiedUrl = 'https://corsproxy.io/?' + encodeURIComponent(icalUrl);
                    fetch(secondaryProxiedUrl)
                        .then(resp => {
                            if (!resp.ok) throw new Error('Secondary proxy failed');
                            return resp.text();
                        })
                        .then(data => {
                             var jcalData = ICAL.parse(data);
                             var comp = new ICAL.Component(jcalData);
                             var vevents = comp.getAllSubcomponents('vevent');
                             var events = vevents.map(function(vevent) {
                                var event = new ICAL.Event(vevent);
                                return { 
                                    title: 'Reserved', 
                                    start: event.startDate.toJSDate(), 
                                    end: event.endDate.toJSDate(), 
                                    display: 'background', 
                                    backgroundColor: '#f8d7da',
                                    allDay: true
                                };
                             });
                             successCallback(events);
                        })
                        .catch(err => {
                            console.error('All proxies failed', err);
                            failureCallback(err);
                        });
                });
        },
        height: 'auto'
    });

    calendar.render();
});
</script>
</body>
</html>
