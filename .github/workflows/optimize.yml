name: Optimize and Deploy Website

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем код (Официальный экшен GitHub)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js (Официальный экшен GitHub)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Устанавливаем проверенные инструменты напрямую через npm и сжимаем файлы
      - name: Minify Assets (HTML/CSS/JS)
        run: |
          npm install -g html-minifier-terser clean-css-cli terser
          
          # Сжимаем HTML (если файлов несколько, они все обработаются)
          for f in $(find . -name "*.html" -not -path "*/node_modules/*"); do
            html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o "$f" "$f"
          done
          
          # Сжимаем CSS
          for f in $(find . -name "*.css" -not -path "*/node_modules/*"); do
            cleancss -o "$f" "$f"
          done
          
          # Сжимаем JS (пропускаем уже минимизированные файлы)
          for f in $(find . -name "*.js" -not -path "*.min.js" -not -path "*/node_modules/*"); do
            terser "$f" --compress --mangle -o "$f"
          done

      # 4. Деплоим готовую версию в ветку gh-pages (Официальный экшен сообщества)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages